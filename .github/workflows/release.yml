name: Release

on:
  push:
    tags:
      - '[0-9][0-9].[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(awk -v tag="$TAG" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" tag "]") > 0) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build install.zip
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          STAGING="staging/jamong-harvest-${TAG}"
          mkdir -p "$STAGING"

          cp install.sh install.bat "$STAGING/"
          cp -r skills "$STAGING/"

          chmod +x "$STAGING/install.sh"

          cd staging
          zip -r "../install.zip" "jamong-harvest-${TAG}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.notes }}
          files: install.zip
